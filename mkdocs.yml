site_name: Foosball Rating
site_description: Техническая документация проекта Foosball Rating
site_url: ""

repo_name: foosball_rating

docs_dir: docs

theme:
  name: material
  language: ru
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      accent: blue

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

nav:
  - Главная: index.md
  - Архитектура:
      - Обзор: architecture/overview.md
      - Статус стека: architecture/stack-status.md
      - ADR:
          - "0001: FastAPI stack": architecture/adr/0001-fastapi-stack.md
          - "0002: Git workflow": architecture/adr/0002-git-workflow.md
          - "0003: Auth without Keycloak": architecture/adr/0003-auth-without-keycloak.md
  - Backend:
      - Обзор: backend/overview.md
      - Фоновые задачи: backend/background-jobs.md
      - Аутентификация и права: backend/auth-and-permissions.md
      - Импорт данных: backend/import.md
      - Расчет рейтинга: backend/rating-calculation.md
      - Тестирование: backend/testing.md
  - Frontend:
      - Обзор: frontend/overview.md
      - Административная панель: frontend/admin-panel.md
      - Тестирование: frontend/testing.md
  - Разработка:
      - Локальный запуск: dev/local-setup.md
      - Инструменты разработки: dev/tooling.md
      - Стиль Python-кода: dev/python-style.md
      - CI: dev/ci.md
      - Git workflow: dev/git-workflow.md
      - Документация: dev/documentation.md
